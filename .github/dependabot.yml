# Dependabot keeps dependencies current so the manual bump commits (see git history:
# Aspire / WolverineFx / OpenTelemetry / Microsoft.Extensions) become reviewed PRs instead.
# NuGet versions are centralized in /Directory.Packages.props (Central Package Management);
# Dependabot reads that file when the ecosystem is "nuget" with the repo-root directory.
#
# Updates are grouped by stack family so a week's bumps arrive as a few coherent PRs rather
# than one-per-package noise — mirroring how these were bumped by hand. The frontend "npm"
# ecosystem block (client/, added once the Vite app landed in the frontend-bootstrap PR, ADR 015)
# groups by frontend family the same way; the pins are caret-minor and the lockfile is committed.
version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # WolverineFx is pinned to CritterWatch's build target — a 6.19.0 ceiling (the app leads the
      # CritterWatch 6.18.0-target by one deliberate minor; see the COUPLING NOTE in
      # Directory.Packages.props). Bumping WolverineFx past 6.19.0 throws a startup TypeLoadException
      # once the CritterWatch console can boot again, so it is an owner decision, not an auto-bump.
      # Marten/JasperFx/Weasel in the critter-stack group are NOT ceilinged and still flow. Lift this
      # when the CritterWatch trial renews and a release targeting 6.19.0+ lands (drop back to lockstep).
      - dependency-name: "WolverineFx*"
        versions: [">=6.20.0"]
    groups:
      critter-stack:
        patterns:
          - "WolverineFx*"
          - "Marten*"
          - "JasperFx*"
          - "Weasel*"
      aspire:
        patterns:
          - "Aspire*"
      opentelemetry:
        patterns:
          - "OpenTelemetry*"
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      test-stack:
        patterns:
          - "Microsoft.NET.Test.Sdk"
          - "xunit*"
          - "Shouldly"
          - "Alba"
          - "Testcontainers*"

  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tanstack:
        patterns:
          - "@tanstack/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      forms-validation:
        patterns:
          - "react-hook-form"
          - "@hookform/*"
          - "zod"
      frontend-test-stack:
        patterns:
          - "vitest"
          - "@testing-library/*"
          - "jsdom"
      build-tooling:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"
          - "@types/node"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
