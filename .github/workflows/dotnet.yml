# CI for CritterMart — build, then unit and integration tests as separate checks.
# Stack: Wolverine 6 / Marten 9 on .NET 10 (see docs/decisions/). ADR 007 — process-manager
# handlers are pure functions — is the future home of the unit suite.
name: .NET

on:
  push:
    branches: ["main"]
    # Skip the whole pipeline when only docs/specs/repo-meta change (no buildable code).
    # A denylist fails safe: forget a type and CI just runs unnecessarily.
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "openspec/**"
      - "LICENSE"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "openspec/**"
      - "LICENSE"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g., new pushes to a PR branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  SOLUTION: CritterMart.slnx
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}
      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      # Fast, no Docker. Selects zero tests today (every test is an Alba + Testcontainers
      # integration test, tagged Category=Integration). Orders' pure-function process-manager
      # tests (ADR 007) — untagged — will run here without a workflow change.
      - name: Unit tests (Category != Integration)
        run: dotnet test ${{ env.SOLUTION }} --filter "Category!=Integration" --verbosity normal

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      # Alba + Testcontainers spin real Postgres containers. ubuntu-latest ships Docker, and
      # Testcontainers manages the container lifecycle, so no `services:` block is needed.
      - name: Integration tests (Category = Integration)
        run: dotnet test ${{ env.SOLUTION }} --filter "Category=Integration" --verbosity normal
