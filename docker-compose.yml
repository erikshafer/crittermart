services:
  postgres:
    image: postgres:17
    container_name: crittermart-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crittermart
    ports:
      - "5432:5432"
    volumes:
      - crittermart-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crittermart"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  crittermart-pgdata:
